# Render blueprint: static SPA + Express API.
# Database: Neon Postgres (created separately; its connection string is set as
# the DATABASE_URL env var on the web service via the Render dashboard).
#
# Both services build from the repo root (where pnpm-lock.yaml lives) so
# pnpm install --frozen-lockfile can see the lockfile. We then --filter into
# the right workspace for the actual build.
#
# pnpm install: we install a fresh copy of corepack via npm (writes to a
# user-owned npm global, not the read-only /usr/bin), then have it activate
# pnpm 11.3.0. The system-bundled corepack on Render's image lives in /usr/bin
# and errors with EROFS when `corepack enable` tries to rewrite its symlinks.
# Node version is pinned via .node-version at the repo root (22.13.0).
# pnpm 11.x requires Node >= 22.13 (uses the node:sqlite builtin added in 22.5).
version: "1"
services:
  - type: web
    name: family-tree-api
    runtime: node
    plan: free
    region: frankfurt
    autoDeployTrigger: commit
    buildCommand: npm install --global corepack@latest && corepack enable && corepack prepare pnpm@11.3.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @family-tree/server prisma:generate && pnpm --filter @family-tree/server build
    startCommand: pnpm --filter @family-tree/server prisma:deploy && pnpm --filter @family-tree/server start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false        # set in dashboard to the Neon connection string (?sslmode=require)
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false        # set to the static site URL once known
      - key: PORT
        value: 10000

  - type: web
    name: family-tree-web
    runtime: static
    autoDeployTrigger: commit
    buildCommand: npm install --global corepack@latest && corepack enable && corepack prepare pnpm@11.3.0 --activate && pnpm install --frozen-lockfile && pnpm --filter @family-tree/client build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        sync: false        # set to the family-tree-api URL once known
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
